<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Joke Generator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        h1 {
            color: #333;
        }
        #joke {
            margin: 20px;
            font-size: 24px;
            color: #555;
            text-align: center;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            background-color: #007BFF;
            color: white;
            border-radius: 5px;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <h1>Random Joke Generator</h1>
    <div id="joke">Click the button to get a joke!</div>
    <button id="jokeButton">Get a New Joke</button>

    <script>
        const jokeButton = document.getElementById('jokeButton');
        const jokeDiv = document.getElementById('joke');

        jokeButton.addEventListener('click', fetchJoke);

        function fetchJoke() {
            fetch('https://v2.jokeapi.dev/joke/Any')
                .then(response => response.json())
                .then(data => {
                    if (data.joke) {
                        jokeDiv.textContent = data.joke;
                    } else {
                        jokeDiv.textContent = data.setup + '\n' + data.delivery;
                    }
                })
                .catch(error => {
                    jokeDiv.textContent = 'Error fetching joke!';
                    console.error('Error:', error);
                });
        }
    </script>
</body>
</html>
